language: scala
sudo: required
dist: trusty

git:
  depth: false

matrix:
  include:
  - stage: build
    env: CI_SCRIPT=ci/test-mill-release.sh
    jdk: oraclejdk8
  - stage: build
    env: CI_SCRIPT=ci/test-mill-release.sh
    jdk: oraclejdk9

  - stage: build
    env: CI_SCRIPT=ci/test-mill-dev.sh
    jdk: oraclejdk8
  - stage: build
    env: CI_SCRIPT=ci/test-mill-dev.sh
    jdk: oraclejdk9
  - stage: build
    env: CI_SCRIPT=ci/test-mill-bootstrap.sh
    jdk: oraclejdk9

  - stage: build
    env: CI_SCRIPT=ci/test-mill-0.sh
    jdk: oraclejdk8
  - stage: build
    env: CI_SCRIPT=ci/test-mill-1.sh
    jdk: oraclejdk8
  - stage: build
    env: CI_SCRIPT=ci/test-mill-2.sh
    jdk: oraclejdk9


  - stage: release
    env: CI_SCRIPT="ci/on-master.py ci/release.sh"
    jdk: oraclejdk8
  - stage: release
    env: CI_SCRIPT="ci/on-master.py ci/publish-docs.sh"
    jdk: oraclejdk8

script:
  - curl -L -o ~/bin/mill https://github.com/lihaoyi/mill/releases/download/0.2.7/0.2.7-10-db8525 && chmod +x ~/bin/mill
  - export PATH=~/bin/mill:$PATH
  - "$CI_SCRIPT"

cache:
  directories:
  - $HOME/.coursier

notifications:
  webhooks:
    urls:
      - https://webhooks.gitter.im/e/3ec13348d390e63a3a38
    on_success: change  # options: [always|never|change] default: always
    on_failure: always  # options: [always|never|change] default: always
    on_start: never     # options: [always|never|change] default: always

